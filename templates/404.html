{% extends 'base.html' %}
{% block title %}Page Not Found — QS Marketplace{% endblock %}
{% block content %}
<div class="error-page">
  <div>
    <div class="error-code">404</div>
    <h2>Page Not Found</h2>
    <p>The page you are looking for does not exist or has been moved.</p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
      <a href="{{ url_for('index') }}" class="btn btn-primary"><i class="fa fa-home"></i> Go Home</a>
      <a href="javascript:history.back()" class="btn btn-outline"><i class="fa fa-arrow-left"></i> Go Back</a>
    </div>
  </div>
</div>
{% endblock %}
