{% extends 'base.html' %}
{% block title %}List a Material — QS Marketplace{% endblock %}
{% block content %}
<div class="main" style="max-width:700px;">
  <div style="margin-bottom:1.5rem;"><a href="{{ url_for('dashboard') }}" style="color:var(--grey);font-size:0.875rem;"><i class="fa fa-arrow-left"></i> Back to Dashboard</a></div>
  <div class="page-header"><h1>List a Material</h1><p>Add your product to the marketplace for clients and QS professionals to find</p></div>
  <div class="card">
    <form method="POST">
      <div class="form-group"><label>Material Name</label><input type="text" name="name" placeholder="e.g. Dangote 3X Cement" required></div>
      <div class="grid-2">
        <div class="form-group"><label>Category</label>
          <select name="category" required>
            <option value="">— Select —</option>
            {% for c in cats %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group"><label>Unit of Measurement</label><input type="text" name="unit" placeholder="e.g. 50kg bag, per ton, per piece" required></div>
      </div>
      <div class="grid-2">
        <div class="form-group"><label>Price (₦)</label><input type="number" name="price" placeholder="8500" min="0" step="0.01" required></div>
        <div class="form-group"><label>Stock Quantity</label><input type="number" name="stock" placeholder="1000" min="0" required></div>
      </div>
      <div class="form-group"><label>Description</label><textarea name="description" rows="4" placeholder="Describe the product, specifications, quality, etc."></textarea></div>
      <div class="form-group"><label>Location / Pickup Point</label><input type="text" name="location" placeholder="e.g. Apapa, Lagos" value="{{ current_user.location or '' }}"></div>
      <div style="display:flex;gap:1rem;justify-content:flex-end;margin-top:0.5rem;">
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary"><i class="fa fa-box"></i> List Material</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
