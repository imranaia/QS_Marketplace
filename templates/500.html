{% extends 'base.html' %}
{% block title %}Server Error — QS Marketplace{% endblock %}
{% block content %}
<div class="error-page">
  <div>
    <div class="error-code">500</div>
    <h2>Something Went Wrong</h2>
    <p>An internal server error occurred. Please try again or contact the administrator.</p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
      <a href="{{ url_for('index') }}" class="btn btn-primary"><i class="fa fa-home"></i> Go Home</a>
      <a href="javascript:location.reload()" class="btn btn-outline"><i class="fa fa-redo"></i> Try Again</a>
    </div>
  </div>
</div>
{% endblock %}
